<!doctype html>
<html>

<body>
  <!-- Header of the Page -->
  <h1>Starting Lineup</h1>

  <!-- Creates the form itself -->
  <form id="lineupForm">

    <!-- Creates a field for the "Status" selection -->
    <!-- "fieldset" is used to group the selections together -->
    <fieldset>
      <legend>Status:</legend>
      <p>
        <input type="radio" id="draft" name="status" value="Draft">
        <label for="draft">Draft</label>

        <input type="radio" id="final" name="status" value="Final" checked>
        <label for="final">Final</label>
      </p>
    </fieldset>

    <!-- A paragraph to hold a dropdown selection -->
    <!-- Only 1 item so no need for "fieldset" -->
    <p>
      <label for="gameDate">Date:</label>
      <select id="gameDate" name="gameDate">
        <option value="March 20">March 20</option>
        <option value="March 24">March 24</option>
        <option value="April 2">April 2</option>
        <option value="April 6">April 6</option>
        <option value="April 13">April 13</option>
      </select>
    </p>

    <!-- Creates a field for the "Players" selection -->
    <fieldset>
      <legend>Players:</legend>

      <!-- Each item is called seperatly to facilitate formating -->
      <p>
        <input type="checkbox" id="aarav" name="players" value="Aarav Agarwal">
        <label for="aarav">Aarav Agarwal</label><br>

        <input type="checkbox" id="ava" name="players" value="Ava Johnson">
        <label for="ava">Ava Johnson</label><br>

        <input type="checkbox" id="julio" name="players" value="Julio Ortiz">
        <label for="julio">Julio Ortiz</label><br>

        <input type="checkbox" id="liam" name="players" value="Liam Rubio">
        <label for="liam">Liam Rubio</label><br>

        <input type="checkbox" id="emma" name="players" value="Emma Witherspoon">
        <label for="emma">Emma Witherspoon</label>
      </p>
    </fieldset>

    <!-- A simple input submit button -->
    <p>
      <input type="submit" value="Submit">
    </p>
  </form>

  <p id="output"></p>

  <script src="script.js"></script>
</body>
</html>
